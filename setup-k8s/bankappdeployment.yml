apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp-deployment
  labels:
    app: bankapp
  namespace: bankapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bankapp
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
      - name: bankapp-cont
        image: trainwithshubham/ai-bankapp:latest
        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: bankapp-configmap

        - secretRef:
            name: bankapp-secrets
