apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp-deployment
  labels:
    app: bankapp
  namespace: bankapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bankapp
  template:
    metadata:
      labels:
        app: bankapp

    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.37
        command: ["/bin/sh", "-c", "until nc -z mysql-service 3306; do sleep 2; done"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      
      - name: wait-for-ollama
        image: busybox:1.37
        command: ["/bin/sh", "-c", "until nc -z ollama-service 11434; do sleep 2; done"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      
      containers:
      - name: bankapp-cont
        imagePullPolicy: IfNotPresent
        image: sandippatil6696/ai-bankapp:v1
        ports:
        - containerPort: 8080
        


        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"