apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql-deployment
  namespace: bankapp
  labels:
    app: mysql
  

spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql-cont
        image: mysql:8.0
        ports:
        - containerPort: 3306

        env:

          - name: MYSQL_DATABASE
            valueFrom:
              configMapKeyRef:
                name: bankapp-configmap      # this vlaue comes from  ConfigMap 
                key: MYSQL_DATABASE          # The key to fetch.
        
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: bankapp-secrets
                key: MYSQL_ROOT_PASSWORD
        
        volumeMounts:
        - name: mysql-vol
          mountPath: /var/lib/mysql
      
      volumes:
        - name: mysql-vol
          persistentVolumeClaim:
            claimName: mysql-pvc
              