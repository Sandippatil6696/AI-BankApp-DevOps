apiVersion: v1
kind: PersistentVolume

metadata:
  name: mysql-pv 
  namespace: bankapp
  labels:
    app: mysql

spec:
  capacity:
    storage: 5Gi
  storageClassName: manual 
  accessModes:
    - ReadWriteOnce
  hostPath:
      path: /mnt/data/mysql

--- 

apiVersion: v1
kind: PersistentVolume

metadata:
  name: ollama-pv 
  namespace: bankapp
  labels:
    app: ollama

spec:
  capacity:
    storage: 5Gi
  storageClassName: manual 
  accessModes:
    - ReadWriteOnce
  hostPath:
      path: /mnt/data/ollama
